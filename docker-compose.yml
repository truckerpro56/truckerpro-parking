version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: parking_dev
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6381:6379"
volumes:
  pgdata:

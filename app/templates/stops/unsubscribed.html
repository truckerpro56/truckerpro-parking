{% extends "stops/base.html" %}
{% block title %}Unsubscribed{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 text-center">
        <div style="width:64px;height:64px;background:var(--bg);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
            <i class="fa-solid fa-envelope-circle-xmark" style="color:var(--text-sec);font-size:1.5rem"></i>
        </div>
        <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:8px">Unsubscribed</h1>
        <p style="color:var(--text-sec);font-size:0.9rem;margin-bottom:24px">You've been unsubscribed from weekly fuel price emails.</p>
        <a href="/" style="color:var(--accent);font-size:0.9rem">Back to Truck Stops Directory</a>
    </div>
</div>
{% endblock %}

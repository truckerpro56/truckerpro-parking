<!DOCTYPE html>
<html lang="en">
<head><title>Blog | Truck Stops Directory</title></head>
<body>
<h1>Blog</h1>
{% for post in posts %}
<article>
  <h2><a href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
  <span>{{ post.category }}</span>
  <time>{{ post.date }}</time>
</article>
{% endfor %}
</body>
</html>
